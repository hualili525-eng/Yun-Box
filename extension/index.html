<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <h1 id="greeting"></h1>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-search">
      <form id="searchForm" class="search-bar" autocomplete="off">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
        <input id="searchInput" class="search-input" type="text" placeholder="搜索或输入网址" spellcheck="false">
        <button type="submit" class="search-submit" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>
        </button>
      </form>
    </div>
    <button class="action-btn close-tabs" id="addGroupBtn" style="align-self:flex-end">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
      新建分组
    </button>
  </header>

  <!-- ================================================================
       CUSTOM BOOKMARKS SECTION — user-defined groups with site shortcuts
       ================================================================ -->
  <div class="bookmarks-section" id="bookmarksSection">
    <div class="bookmarks-groups" id="bookmarksGroups"></div>
  </div>

  <!-- Add Group Modal -->
  <div class="bm-modal-overlay" id="addGroupModal" style="display:none">
    <div class="bm-modal">
      <div class="bm-modal-title">新建分组</div>
      <input class="bm-input" id="newGroupName" type="text" placeholder="分组名称" maxlength="20">
      <div class="bm-modal-actions">
        <button class="bm-btn-cancel" id="cancelAddGroup">取消</button>
        <button class="bm-btn-confirm" id="confirmAddGroup">创建</button>
      </div>
    </div>
  </div>

  <!-- Rename Group Modal -->
  <div class="bm-modal-overlay" id="renameGroupModal" style="display:none">
    <div class="bm-modal">
      <div class="bm-modal-title">重命名分组</div>
      <input class="bm-input" id="renameGroupName" type="text" placeholder="分组名称" maxlength="20">
      <div class="bm-modal-actions">
        <button class="bm-btn-cancel" id="cancelRenameGroup">取消</button>
        <button class="bm-btn-confirm" id="confirmRenameGroup">确认</button>
      </div>
    </div>
  </div>

  <!-- Edit Site Modal -->
  <div class="bm-modal-overlay" id="renameSiteModal" style="display:none">
    <div class="bm-modal">
      <div class="bm-modal-title">修改网站</div>
      <input class="bm-input" id="renameSiteUrl" type="url" placeholder="网址 (https://...)" autocomplete="off">
      <input class="bm-input" id="renameSiteName" type="text" placeholder="名称（可选）" maxlength="30">
      <div class="bm-modal-actions">
        <button class="bm-btn-cancel" id="cancelRenameSite">取消</button>
        <button class="bm-btn-confirm" id="confirmRenameSite">确认</button>
      </div>
    </div>
  </div>

  <!-- Site context menu -->
  <div class="bm-context-menu" id="siteContextMenu" style="display:none">
    <button class="bm-context-item" id="ctxRenameSite">修改名称</button>
    <button class="bm-context-item danger" id="ctxDeleteSite">删除网站</button>
  </div>

  <!-- Add Bookmark Modal -->
  <div class="bm-modal-overlay" id="addBookmarkModal" style="display:none">
    <div class="bm-modal">
      <div class="bm-modal-title">添加网站</div>
      <input class="bm-input" id="newBookmarkUrl" type="url" placeholder="网址 (https://...)" autocomplete="off">
      <input class="bm-input" id="newBookmarkName" type="text" placeholder="名称（可选）" maxlength="20">
      <div class="bm-modal-actions">
        <button class="bm-btn-cancel" id="cancelAddBookmark">取消</button>
        <button class="bm-btn-confirm" id="confirmAddBookmark">添加</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <!-- Active checklist items — injected by renderDeferredList() in app.js -->
      <div class="deferred-list" id="deferredList"></div>

      <!-- Empty state — shown when no active deferred tabs -->
      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        Nothing saved. Living in the moment.
      </div>

      <!-- Archive section — collapsed by default -->
      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          Archive
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;">Yun Box by erxi</span>
      <button class="bg-upload-btn" id="bgUploadBtn" title="设置背景图片">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
        背景
      </button>
      <button class="bg-upload-btn bg-clear-btn" id="bgClearBtn" title="移除背景" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
        移除背景
      </button>
      <input type="file" id="bgFileInput" accept="image/*" style="display:none">
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
